services:
  guardrail:
    build: .
    # Ascend NPU driver requires privileged mode inside Docker.
    # (equivalent to `docker run --privileged`)
    privileged: true
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: 1
    environment:
      - PORT=8001
      # 8 workers, one per NPU card.
      # gunicorn.conf.py post_fork sets SENTINELSHIELD_PROMPT_GUARD_DEVICE=npu:<id>
      # for each worker so it targets its own card directly.
      - WEB_CONCURRENCY=8
      - ASCEND_NUM_DEVICES=8
      # One inference thread per worker is enough – each worker owns one NPU
      # and InferenceBatcher already queues concurrent async requests.
      - SENTINELSHIELD_INFERENCE_MAX_WORKERS=1
      - SENTINELSHIELD_INFERENCE_CONCURRENCY=2
      # Batching: collect up to 32 requests within a 50 ms window before
      # running a single NPU forward pass.  Adjust to taste.
      - SENTINELSHIELD_PROMPT_GUARD_BATCHING=1
      - SENTINELSHIELD_PROMPT_GUARD_MAX_BATCH_SIZE=64
      - SENTINELSHIELD_PROMPT_GUARD_MAX_WAIT_MS=25
      - SENTINELSHIELD_INFERENCE_CACHE_SIZE=4096
      - TIMEOUT=180
      # Rule-engine cache – larger value = fewer regex re-evaluations.
      - SENTINELSHIELD_RULE_EVAL_CACHE_SIZE=8192
      # Model paths – point to the host-mounted directories inside the container.
      # Run `python download.py` on the host once to populate ./models/ before
      # starting the stack.  No network access is performed inside the container.
      - SENTINELSHIELD_PROMPT_GUARD_MODEL_PATH=/workspace/models/Llama-Prompt-Guard-2-86M
      - SENTINELSHIELD_LLAMA_GUARD_MODEL_PATH=/workspace/models/Llama-Guard-4-12B
      # Block all HuggingFace / Transformers network calls inside the container.
      - DISABLE_FILE_LOGGING=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      # QW3 remote guard settings
      # - QW3_GUARD_API_KEY=...
      # - QW3_GUARD_API_BASE=http://172.16.21.51:8036/v1
      # - QW3_GUARD_MODEL=qw3-guard
      # - QW3_GUARD_CONCURRENCY=200
      # - QW3_GUARD_MAX_RETRIES=2
    devices:
      # All 8 Ascend NPU compute cards
      - /dev/davinci0
      - /dev/davinci1
      - /dev/davinci2
      - /dev/davinci3
      - /dev/davinci4
      - /dev/davinci5
      - /dev/davinci6
      - /dev/davinci7
      # Ascend management / IPC devices (required by the driver)
      - /dev/davinci_manager
      - /dev/hisi_hdc
      - /dev/devmm_svm
    volumes:
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
      - /usr/local/sbin:/usr/local/sbin:ro
      # Host-downloaded models – run `python download.py` once on the host to
      # populate ./models/ before starting the stack.  Each sub-directory
      # corresponds to one model and is referenced by its env var above.
      # The container has no internet access; all model weights must be present
      # in this mount before `docker compose up`.
      - ./models:/workspace/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/v1/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    expose:
      - "8001"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      guardrail:
        condition: service_healthy
    environment:
      # Set SERVER2_IP on Server 1 to enable load-balancing to Server 2.
      # Example: SERVER2_IP=172.16.21.52 docker compose up -d
      # When SERVER2_IP is unset the backup entry resolves to the local guardrail
      # container so nginx starts cleanly in single-server mode.
      - SERVER2_UPSTREAM=${SERVER2_IP:-guardrail}:${SERVER2_PORT:-8002}
      # Write the substituted template directly to nginx.conf (not conf.d/)
      # so that top-level directives like worker_processes are valid.
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: 1
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
